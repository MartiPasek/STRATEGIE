<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STRATEGIE</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0e0f11;
      --surface:   #16181c;
      --border:    #2a2d33;
      --accent:    #4f8ef7;
      --accent2:   #7c5cfc;
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --success:   #34d399;
      --error:     #f87171;
      --radius:    12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── Layout ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 820px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 0 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .user-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 14px 5px 8px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      transition: border-color .2s;
    }
    .user-pill:hover { border-color: var(--accent); color: var(--text); }
    .user-avatar {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600; color: #fff;
      flex-shrink: 0;
    }

    /* ── User ID panel ── */
    .user-panel {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-top: 10px;
      flex-shrink: 0;
    }
    .user-panel.open { display: block; }
    .user-panel label {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
    }
    .user-panel input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      outline: none;
      transition: border-color .2s;
    }
    .user-panel input:focus { border-color: var(--accent); }
    .user-panel .hint {
      margin-top: 6px;
      font-size: 11px;
      color: var(--muted);
    }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 4px;
      animation: fadeIn .25s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-role {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      padding-left: 2px;
    }

    .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .msg-bubble {
      background: #1a1f2e;
      border-color: #2a3350;
      color: #c5cfe8;
    }

    .msg.assistant .msg-bubble {
      border-color: var(--border);
    }

    /* Structured result cards */
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .result-section {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .result-section:last-child { border-bottom: none; }

    .result-label {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .result-text {
      font-size: 14px;
      color: var(--text);
      line-height: 1.6;
    }

    .result-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .result-list li {
      font-size: 14px;
      padding-left: 14px;
      position: relative;
      color: var(--text);
    }
    .result-list li::before {
      content: '›';
      position: absolute;
      left: 0;
      color: var(--accent);
    }

    .result-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .tag {
      background: #1a2035;
      border: 1px solid #2a3555;
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 12px;
      color: #8ab4f8;
    }

    /* Loading */
    .msg.loading .msg-bubble {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
    }
    .dots {
      display: flex; gap: 4px;
    }
    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce .9s infinite;
    }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: .4; }
      40%           { transform: translateY(-5px); opacity: 1; }
    }

    /* Error */
    .msg.error .msg-bubble {
      border-color: var(--error);
      color: var(--error);
      background: #1f1515;
    }

    /* ── Input area ── */
    .input-area {
      padding: 14px 0 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      outline: none;
      min-height: 48px;
      max-height: 160px;
      transition: border-color .2s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    .send-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity .2s, transform .15s;
    }
    .send-btn:hover { opacity: .85; transform: scale(1.05); }
    .send-btn:active { transform: scale(.97); }
    .send-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }
    .send-btn svg { width: 18px; height: 18px; fill: #fff; }

    /* Empty state */
    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      text-align: center;
      padding: 40px 0;
    }
    .empty-icon {
      font-size: 32px;
      opacity: .4;
    }
    .empty p { font-size: 14px; max-width: 280px; }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="logo">Strategie</div>
    <div class="user-pill" id="userToggle">
      <div class="user-avatar" id="userAvatar">?</div>
      <span id="userLabel">Nastavit uživatele</span>
    </div>
  </header>

  <!-- User ID panel -->
  <div class="user-panel" id="userPanel">
    <label>X-Dev-User-Id (UUID)</label>
    <input type="text" id="userIdInput" placeholder="např. 537396e5-f7ab-4403-932e-ba295c7540b9" />
    <div class="hint">Dev identifikátor — předává se jako header. Není autentizace.</div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="empty" id="emptyState">
      <div class="empty-icon">◈</div>
      <p>Zadej text ke zpracování — schůzku, poznámku nebo přepis hlasu.</p>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <textarea
        id="inputText"
        placeholder="Zadej text ke zpracování…"
        rows="2"
      ></textarea>
      <button class="send-btn" id="sendBtn" title="Odeslat">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('inputText');
  const sendBtn    = document.getElementById('sendBtn');
  const emptyState = document.getElementById('emptyState');
  const userToggle = document.getElementById('userToggle');
  const userPanel  = document.getElementById('userPanel');
  const userIdInput= document.getElementById('userIdInput');
  const userLabel  = document.getElementById('userLabel');
  const userAvatar = document.getElementById('userAvatar');

  // User panel toggle
  userToggle.addEventListener('click', () => {
    userPanel.classList.toggle('open');
  });

  userIdInput.addEventListener('input', () => {
    const val = userIdInput.value.trim();
    if (val) {
      const initials = val.slice(0, 2).toUpperCase();
      userAvatar.textContent = initials;
      userLabel.textContent  = val.slice(0, 8) + '…';
    } else {
      userAvatar.textContent = '?';
      userLabel.textContent  = 'Nastavit uživatele';
    }
  });

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });

  // Send on Enter (Shift+Enter = nový řádek)
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  sendBtn.addEventListener('click', send);

  function addMessage(role, content, type = 'text') {
    emptyState.style.display = 'none';

    const msg = document.createElement('div');
    msg.className = `msg ${role}`;

    const roleEl = document.createElement('div');
    roleEl.className = 'msg-role';
    roleEl.textContent = role === 'user' ? 'Vstup' : role === 'loading' ? '' : 'Výsledek';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';

    if (type === 'loading') {
      msg.classList.add('loading');
      bubble.innerHTML = `<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div> Analyzuji…`;
    } else if (type === 'error') {
      msg.classList.add('error');
      bubble.textContent = content;
    } else if (type === 'result') {
      bubble.remove();
      const card = buildResultCard(content);
      msg.appendChild(roleEl);
      msg.appendChild(card);
      messagesEl.appendChild(msg);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return msg;
    } else {
      bubble.textContent = content;
    }

    msg.appendChild(roleEl);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return msg;
  }

  function buildResultCard(data) {
    const card = document.createElement('div');
    card.className = 'result-card';

    // Summary
    if (data.summary) {
      const s = document.createElement('div');
      s.className = 'result-section';
      s.innerHTML = `<div class="result-label">Shrnutí</div><div class="result-text">${esc(data.summary)}</div>`;
      card.appendChild(s);
    }

    // Action items
    if (data.action_items?.length) {
      const s = document.createElement('div');
      s.className = 'result-section';
      const items = data.action_items.map(i => `<li>${esc(i)}</li>`).join('');
      s.innerHTML = `<div class="result-label">Akční body</div><ul class="result-list">${items}</ul>`;
      card.appendChild(s);
    }

    // Persons
    if (data.persons?.length) {
      const s = document.createElement('div');
      s.className = 'result-section';
      const tags = data.persons.map(p => `<span class="tag">${esc(p)}</span>`).join('');
      s.innerHTML = `<div class="result-label">Osoby</div><div class="result-tags">${tags}</div>`;
      card.appendChild(s);
    }

    // Recommendations
    if (data.recommendations?.length) {
      const s = document.createElement('div');
      s.className = 'result-section';
      const items = data.recommendations.map(i => `<li>${esc(i)}</li>`).join('');
      s.innerHTML = `<div class="result-label">Doporučení</div><ul class="result-list">${items}</ul>`;
      card.appendChild(s);
    }

    return card;
  }

  function esc(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text) return;

    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    addMessage('user', text);
    const loadingMsg = addMessage('loading', '', 'loading');

    const userId = userIdInput.value.trim();
    const headers = { 'Content-Type': 'application/json' };
    if (userId) headers['X-Dev-User-Id'] = userId;

    try {
      const res = await fetch('/api/v1/analyse', {
        method: 'POST',
        headers,
        body: JSON.stringify({ text }),
      });

      loadingMsg.remove();

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        addMessage('error', err.detail || `Chyba ${res.status}`, 'error');
      } else {
        const data = await res.json();
        addMessage('assistant', data, 'result');
      }
    } catch (e) {
      loadingMsg.remove();
      addMessage('error', 'Nepodařilo se spojit se serverem.', 'error');
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }
</script>
</body>
</html>
