<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STRATEGIE</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0f11; --surface: #16181c; --border: #2a2d33;
      --accent: #4f8ef7; --accent2: #7c5cfc; --text: #e8eaf0;
      --muted: #6b7280; --error: #f87171; --radius: 12px;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; }

    /* ── SHARED BOX ── */
    .centered { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    .box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px 36px; width: 380px; display: flex; flex-direction: column; gap: 20px; }
    .box-logo { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; }
    .box-title { font-size: 20px; font-weight: 500; text-align: center; }
    .box-sub { font-size: 13px; color: var(--muted); text-align: center; line-height: 1.6; }
    .box-input { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; width: 100%; transition: border-color .2s; }
    .box-input:focus { border-color: var(--accent); }
    .box-btn { background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 10px; padding: 12px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity .2s; width: 100%; }
    .box-btn:hover { opacity: .85; }
    .box-btn:disabled { opacity: .4; cursor: not-allowed; }
    .box-error { font-size: 13px; color: var(--error); text-align: center; min-height: 18px; }
    .box-success { font-size: 13px; color: #34d399; text-align: center; }

    /* ── APP ── */
    .app { display: none; flex-direction: column; height: 100vh; max-width: 820px; margin: 0 auto; padding: 0 16px; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 18px 0 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .logo { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .user-pill { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
    .conv-id { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
    .new-chat-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 5px 12px; color: var(--muted); font-size: 12px; cursor: pointer; transition: border-color .2s; }
    .new-chat-btn:hover { border-color: var(--accent); color: var(--text); }
    .logout-btn { background: none; border: none; color: var(--muted); font-size: 12px; cursor: pointer; padding: 5px 8px; }
    .logout-btn:hover { color: var(--error); }
    .agent-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; margin-top: 10px; font-size: 12px; color: var(--muted); flex-shrink: 0; }
    .agent-bar span { color: var(--accent); font-family: 'DM Mono', monospace; }
    .messages { flex: 1; overflow-y: auto; padding: 20px 0; display: flex; flex-direction: column; gap: 16px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .msg { display: flex; flex-direction: column; gap: 4px; animation: fadeIn .25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .msg-role { font-size: 11px; font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); padding-left: 2px; }
    .msg-bubble { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
    .msg.user .msg-bubble { background: #1a1f2e; border-color: #2a3350; color: #c5cfe8; }
    .msg.loading .msg-bubble { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 13px; }
    .dots { display: flex; gap: 4px; }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: bounce .9s infinite; }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%,80%,100% { transform: translateY(0); opacity: .4; } 40% { transform: translateY(-5px); opacity: 1; } }
    .msg.error .msg-bubble { border-color: var(--error); color: var(--error); background: #1f1515; }
    .empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--muted); text-align: center; padding: 40px 0; }
    .empty-icon { font-size: 32px; opacity: .4; }
    .empty p { font-size: 14px; max-width: 280px; }
    .input-area { padding: 14px 0 20px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .input-row { display: flex; gap: 10px; align-items: flex-end; }
    textarea { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.5; resize: none; outline: none; min-height: 48px; max-height: 160px; transition: border-color .2s; }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }
    .send-btn { background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 10px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: opacity .2s, transform .15s; }
    .send-btn:hover { opacity: .85; transform: scale(1.05); }
    .send-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }
    .send-btn svg { width: 18px; height: 18px; fill: #fff; }
  </style>
</head>
<body>

  <!-- INVITE ACCEPT -->
  <div class="centered" id="inviteScreen" style="display:none">
    <div class="box">
      <div class="box-logo">Strategie</div>
      <div class="box-title">Vítej v STRATEGIE</div>
      <div class="box-sub" id="inviteSub">Přijímám pozvánku…</div>
      <div class="box-error" id="inviteError"></div>
    </div>
  </div>

  <!-- LOGIN -->
  <div class="centered" id="loginScreen">
    <div class="box">
      <div class="box-logo">Strategie</div>
      <div class="box-title">Vítej zpět</div>
      <div class="box-sub">Zadej svůj email pro přihlášení</div>
      <input class="box-input" type="email" id="loginEmail" placeholder="tvuj@email.cz" />
      <button class="box-btn" id="loginBtn">Přihlásit se</button>
      <div class="box-error" id="loginError"></div>
    </div>
  </div>

  <!-- APP -->
  <div class="app" id="appScreen">
    <header class="header">
      <div class="logo">Strategie</div>
      <div class="header-right">
        <div class="user-pill" id="userPill"></div>
        <div class="conv-id" id="convIdLabel"></div>
        <button class="new-chat-btn" id="newChatBtn">+ Nová</button>
        <button class="logout-btn" id="logoutBtn">Odhlásit</button>
      </div>
    </header>
    <div class="agent-bar">Mluvíš s: <span id="agentName">Marti-AI</span></div>
    <div class="messages" id="messages">
      <div class="empty" id="emptyState">
        <div class="empty-icon">◈</div>
        <p>Začni psát — Marti-AI tě provede.</p>
      </div>
    </div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="inputText" placeholder="Napiš zprávu…" rows="2"></textarea>
        <button class="send-btn" id="sendBtn">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>

<script>
  let currentUser = null;
  let conversationId = null;

  const inviteScreen = document.getElementById('inviteScreen');
  const loginScreen  = document.getElementById('loginScreen');
  const appScreen    = document.getElementById('appScreen');
  const loginEmail   = document.getElementById('loginEmail');
  const loginBtn     = document.getElementById('loginBtn');
  const loginError   = document.getElementById('loginError');
  const userPill     = document.getElementById('userPill');
  const convIdLabel  = document.getElementById('convIdLabel');
  const newChatBtn   = document.getElementById('newChatBtn');
  const logoutBtn    = document.getElementById('logoutBtn');
  const messagesEl   = document.getElementById('messages');
  const inputEl      = document.getElementById('inputText');
  const sendBtn      = document.getElementById('sendBtn');
  const emptyState   = document.getElementById('emptyState');

  // ── INVITE FLOW ────────────────────────────────────────────────────────
  async function checkInviteToken() {
    const path = window.location.pathname;
    const match = path.match(/^\/invite\/(.+)$/);
    if (!match) return false;

    const token = match[1];
    loginScreen.style.display = 'none';
    inviteScreen.style.display = 'flex';
    document.getElementById('inviteSub').textContent = 'Přijímám pozvánku…';

    try {
      const res = await fetch(`/api/v1/auth/accept/${token}`, {
        credentials: 'include',
      });

      if (!res.ok) {
        document.getElementById('inviteSub').textContent = '';
        document.getElementById('inviteError').textContent = 'Pozvánka není platná nebo vypršela.';
        return true;
      }

      currentUser = await res.json();
      document.getElementById('inviteSub').textContent =
        `Vítej, ${currentUser.first_name || currentUser.email}! Přihlašuji tě…`;

      // Přesměruj na root po 1.5s
      setTimeout(() => {
        window.history.replaceState({}, '', '/');
        inviteScreen.style.display = 'none';
        showApp();
      }, 1500);

    } catch (e) {
      document.getElementById('inviteError').textContent = 'Chyba spojení.';
    }
    return true;
  }

  // ── LOGIN ──────────────────────────────────────────────────────────────
  loginBtn.addEventListener('click', doLogin);
  loginEmail.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  async function doLogin() {
    const email = loginEmail.value.trim();
    if (!email) { loginError.textContent = 'Zadej email.'; return; }
    loginBtn.disabled = true;
    loginError.textContent = '';
    try {
      const res = await fetch('/api/v1/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
        credentials: 'include',
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        loginError.textContent = err.detail || 'Přihlášení selhalo.';
        return;
      }
      currentUser = await res.json();
      await showApp();
    } catch (e) {
      loginError.textContent = 'Chyba spojení.';
    } finally {
      loginBtn.disabled = false;
    }
  }

  async function showApp() {
    loginScreen.style.display = 'none';
    appScreen.style.display = 'flex';
    const name = [currentUser.first_name, currentUser.last_name].filter(Boolean).join(' ') || currentUser.email;
    userPill.textContent = name;
    await loadLastConversation();
    inputEl.focus();
  }

  // ── LAST CONVERSATION ──────────────────────────────────────────────────
  async function loadLastConversation() {
    try {
      const res = await fetch('/api/v1/conversation/last', { credentials: 'include' });
      if (!res.ok) return;
      const data = await res.json();
      if (!data || !data.messages || data.messages.length === 0) return;
      conversationId = data.conversation_id;
      convIdLabel.textContent = `#${conversationId}`;
      if (data.active_persona) {
        document.getElementById('agentName').textContent = data.active_persona;
      }
      data.messages.forEach(msg => renderMessage(msg.role, msg.content));
      messagesEl.scrollTop = messagesEl.scrollHeight;
    } catch (e) {}
  }

  // ── LOGOUT ─────────────────────────────────────────────────────────────
  logoutBtn.addEventListener('click', async () => {
    await fetch('/api/v1/auth/logout', { method: 'POST', credentials: 'include' });
    currentUser = null; conversationId = null;
    appScreen.style.display = 'none';
    loginScreen.style.display = 'flex';
    loginEmail.value = ''; loginError.textContent = '';
    messagesEl.innerHTML = '';
    messagesEl.appendChild(emptyState);
    emptyState.style.display = '';
  });

  // ── CHAT ───────────────────────────────────────────────────────────────
  newChatBtn.addEventListener('click', () => {
    conversationId = null; convIdLabel.textContent = '';
    messagesEl.innerHTML = '';
    messagesEl.appendChild(emptyState);
    emptyState.style.display = '';
  });

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  sendBtn.addEventListener('click', send);

  function renderMessage(role, content) {
    emptyState.style.display = 'none';
    const msg = document.createElement('div');
    msg.className = `msg ${role}`;
    const roleEl = document.createElement('div');
    roleEl.className = 'msg-role';
    roleEl.textContent = role === 'user'
      ? ([currentUser?.first_name, currentUser?.last_name].filter(Boolean).join(' ') || 'Ty')
      : 'Marti-AI';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = content;
    msg.appendChild(roleEl); msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    return msg;
  }

  function addMessage(role, content, type = 'text') {
    emptyState.style.display = 'none';
    const msg = document.createElement('div');
    msg.className = `msg ${role}`;
    const roleEl = document.createElement('div');
    roleEl.className = 'msg-role';
    roleEl.textContent = role === 'user'
      ? ([currentUser?.first_name, currentUser?.last_name].filter(Boolean).join(' ') || 'Ty')
      : role === 'loading' ? '' : 'Marti-AI';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    if (type === 'loading') {
      msg.classList.add('loading');
      bubble.innerHTML = `<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div> Přemýšlím…`;
    } else if (type === 'error') {
      msg.classList.add('error'); bubble.textContent = content;
    } else {
      bubble.textContent = content;
    }
    msg.appendChild(roleEl); msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return msg;
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text) return;
    sendBtn.disabled = true;
    inputEl.value = ''; inputEl.style.height = 'auto';
    addMessage('user', text);
    const loadingMsg = addMessage('loading', '', 'loading');
    try {
      const res = await fetch('/api/v1/conversation/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, conversation_id: conversationId }),
        credentials: 'include',
      });
      loadingMsg.remove();
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        addMessage('error', err.detail || `Chyba ${res.status}`, 'error');
      } else {
        const data = await res.json();
        conversationId = data.conversation_id;
        convIdLabel.textContent = `#${conversationId}`;
        addMessage('assistant', data.reply);
        if (data.active_persona) {
          document.getElementById('agentName').textContent = data.active_persona;
        }
      }
    } catch (e) {
      loadingMsg.remove();
      addMessage('error', 'Nepodařilo se spojit se serverem.', 'error');
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  // ── INIT ───────────────────────────────────────────────────────────────
  (async () => {
    const handled = await checkInviteToken();
    if (!handled) {
      loginScreen.style.display = 'flex';
    }
  })();
</script>
</body>
</html>
